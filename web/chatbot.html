<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JobWala Chatbot</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #ff6b35 0%, #e55a2b 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .chatbot-container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.1);
            overflow: hidden;
            width: 100%;
            max-width: 400px;
            height: 600px;
            display: flex;
            flex-direction: column;
        }

        .chatbot-header {
            background: #ff6b35;
            color: white;
            padding: 20px;
            text-align: center;
        }

        .chatbot-header h2 {
            font-size: 20px;
            margin-bottom: 5px;
        }

        .chatbot-header p {
            font-size: 14px;
            opacity: 0.9;
        }

        .chatbot-messages {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
            background: #f8f9fa;
        }

        .message {
            margin-bottom: 15px;
            display: flex;
            align-items: flex-start;
        }

        .message.user {
            justify-content: flex-end;
        }

        .message-content {
            max-width: 80%;
            padding: 12px 16px;
            border-radius: 18px;
            font-size: 14px;
            line-height: 1.4;
        }

        .message.bot .message-content {
            background: white;
            color: #333;
            border: 1px solid #e9ecef;
            margin-right: 10px;
        }

        .message.user .message-content {
            background: #ff6b35;
            color: white;
            margin-left: 10px;
        }

        .message-avatar {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
            flex-shrink: 0;
        }

        .message.bot .message-avatar {
            background: #ff6b35;
            color: white;
        }

        .message.user .message-avatar {
            background: #e9ecef;
            color: #ff6b35;
        }

        .quick-actions {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-top: 10px;
        }

        .quick-action-btn {
            background: #f8f9fa;
            border: 1px solid #e9ecef;
            padding: 8px 12px;
            border-radius: 20px;
            font-size: 12px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .quick-action-btn:hover {
            background: #ff6b35;
            color: white;
            border-color: #ff6b35;
        }

        .chatbot-input {
            padding: 20px;
            background: white;
            border-top: 1px solid #e9ecef;
        }

        .input-container {
            display: flex;
            gap: 10px;
        }

        .chatbot-input input {
            flex: 1;
            padding: 12px 16px;
            border: 1px solid #e9ecef;
            border-radius: 25px;
            font-size: 14px;
            outline: none;
        }

        .chatbot-input input:focus {
            border-color: #ff6b35;
        }

        .send-btn {
            background: #ff6b35;
            color: white;
            border: none;
            width: 45px;
            height: 45px;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s;
        }

        .send-btn:hover {
            background: #e55a2b;
            transform: scale(1.05);
        }

        .typing-indicator {
            display: none;
            align-items: center;
            gap: 5px;
            color: #666;
            font-size: 12px;
            margin-top: 10px;
        }

        .typing-dots {
            display: flex;
            gap: 3px;
        }

        .typing-dot {
            width: 6px;
            height: 6px;
            background: #ff6b35;
            border-radius: 50%;
            animation: typing 1.4s infinite;
        }

        .typing-dot:nth-child(2) {
            animation-delay: 0.2s;
        }

        .typing-dot:nth-child(3) {
            animation-delay: 0.4s;
        }

        @keyframes typing {
            0%, 60%, 100% {
                transform: translateY(0);
            }
            30% {
                transform: translateY(-10px);
            }
        }

        .welcome-message {
            text-align: center;
            color: #666;
            font-size: 14px;
            margin-bottom: 20px;
        }

        .back-btn {
            position: absolute;
            top: 20px;
            left: 20px;
            background: rgba(255, 255, 255, 0.2);
            color: white;
            border: none;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s;
        }

        .back-btn:hover {
            background: rgba(255, 255, 255, 0.3);
        }
    </style>
</head>
<body>
    <a href="index.html" class="back-btn">
        <i class="fas fa-arrow-left"></i>
    </a>

    <div class="chatbot-container">
        <div class="chatbot-header">
            <h2><i class="fas fa-robot"></i> JobWala Assistant</h2>
            <p>How can I help you today?</p>
        </div>

        <div class="chatbot-messages" id="chatbotMessages">
            <div class="welcome-message">
                <p>👋 Hi! I'm your JobWala assistant. I can help you with:</p>
            </div>
            
            <div class="message bot">
                <div class="message-avatar">
                    <i class="fas fa-robot"></i>
                </div>
                <div class="message-content">
                    <p>Welcome to JobWala! I'm here to help you navigate our job portal and answer any questions you might have. What would you like to know?</p>
                    <div class="quick-actions">
                        <button class="quick-action-btn" onclick="sendQuickMessage('How do I search for jobs?')">🔍 Job Search</button>
                        <button class="quick-action-btn" onclick="sendQuickMessage('How do I create an account?')">👤 Account</button>
                        <button class="quick-action-btn" onclick="sendQuickMessage('How do I build a resume?')">📄 Resume</button>
                        <button class="quick-action-btn" onclick="sendQuickMessage('What are the features?')">✨ Features</button>
                    </div>
                </div>
            </div>
        </div>

        <div class="typing-indicator" id="typingIndicator">
            <span>Assistant is typing</span>
            <div class="typing-dots">
                <div class="typing-dot"></div>
                <div class="typing-dot"></div>
                <div class="typing-dot"></div>
            </div>
        </div>

        <div class="chatbot-input">
            <div class="input-container">
                <input type="text" id="messageInput" placeholder="Type your message..." onkeypress="handleKeyPress(event)">
                <button class="send-btn" onclick="sendMessage()">
                    <i class="fas fa-paper-plane"></i>
                </button>
            </div>
        </div>
    </div>

    <script>
        // Chatbot responses database
        const chatbotResponses = {
            greetings: [
                "Hello! How can I help you today?",
                "Hi there! What can I assist you with?",
                "Hey! I'm here to help you with JobWala.",
                "Welcome! How may I help you?"
            ],
            jobSearch: [
                "To search for jobs, use the search bar on the homepage. You can search by keywords, location, and experience level. You can also browse by categories like Remote, MNC, Banking & Finance, etc.",
                "Job search is easy! Just enter your skills, location, and experience in the search bar. You can also filter by job type, salary range, and company size.",
                "Use our advanced search filters to find the perfect job. You can search by job title, company, location, salary, and more!"
            ],
            account: [
                "To create an account, click the 'Register' button in the top right corner. Choose your account type (Job Seeker, Company, or Consultancy) and fill in your details.",
                "Creating an account is simple! Click 'Register' and select whether you're a job seeker or employer. Then follow the registration process.",
                "You can register as a Job Seeker, Company, or Consultancy. Each account type has different features tailored to your needs."
            ],
            resume: [
                "To build a resume, click on 'Resume' in the navigation menu or the 'View details' button in the resume section. You can choose from professional templates and customize every detail.",
                "Our resume builder offers multiple templates and allows you to create a professional resume in minutes. You can also edit existing resumes.",
                "Build your resume using our templates, or upload an existing one to edit. We have Professional, Creative, and Minimal designs to choose from."
            ],
            features: [
                "JobWala offers: Job search with advanced filters, Resume builder with templates, Company profiles, Application tracking, Career guidance, Interview preparation, and much more!",
                "Our features include: Thousands of job listings, Professional resume builder, Company insights, Application management, Career advice, and 24/7 support.",
                "Key features: Smart job matching, Resume templates, Company reviews, Application status tracking, Career guidance, Interview prep, and personalized recommendations."
            ],
            login: [
                "To login, click the 'Login' button in the top right corner. You can login as a Job Seeker, Employer, or Admin.",
                "Login is simple! Click 'Login' and select your account type. Enter your email and password to access your account.",
                "You can login with your email and password. Make sure to select the correct account type (Job Seeker, Employer, or Admin)."
            ],
            help: [
                "I'm here to help! You can ask me about job searching, account creation, resume building, website features, or any other questions about JobWala.",
                "Feel free to ask me anything about using JobWala. I can help with navigation, features, account management, and more!",
                "I can assist you with job search, resume building, account setup, website navigation, and answer any questions you have about our platform."
            ],
            default: [
                "I'm not sure I understand. Could you please rephrase your question? I can help with job search, account creation, resume building, and website features.",
                "Let me help you better. You can ask me about job searching, creating an account, building resumes, or using our features.",
                "I'd be happy to help! Try asking about job search, account setup, resume building, or our website features."
            ]
        };

        // Keywords mapping
        const keywordMap = {
            'hello': 'greetings',
            'hi': 'greetings',
            'hey': 'greetings',
            'search': 'jobSearch',
            'job': 'jobSearch',
            'find': 'jobSearch',
            'register': 'account',
            'signup': 'account',
            'account': 'account',
            'resume': 'resume',
            'cv': 'resume',
            'features': 'features',
            'login': 'login',
            'signin': 'login',
            'help': 'help',
            'support': 'help'
        };

        function sendQuickMessage(message) {
            document.getElementById('messageInput').value = message;
            sendMessage();
        }

        function handleKeyPress(event) {
            if (event.key === 'Enter') {
                sendMessage();
            }
        }

        function sendMessage() {
            const input = document.getElementById('messageInput');
            const message = input.value.trim();
            
            if (message === '') return;

            // Add user message to chat
            addMessage(message, 'user');
            input.value = '';

            // Show typing indicator
            showTypingIndicator();

            // Generate bot response
            setTimeout(() => {
                hideTypingIndicator();
                const response = generateResponse(message);
                addMessage(response, 'bot');
            }, 1000 + Math.random() * 1000);
        }

        function addMessage(content, sender) {
            const messagesContainer = document.getElementById('chatbotMessages');
            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${sender}`;

            const avatar = sender === 'bot' ? '<i class="fas fa-robot"></i>' : '<i class="fas fa-user"></i>';
            
            messageDiv.innerHTML = `
                <div class="message-avatar">
                    ${avatar}
                </div>
                <div class="message-content">
                    <p>${content}</p>
                </div>
            `;

            messagesContainer.appendChild(messageDiv);
            messagesContainer.scrollTop = messagesContainer.scrollHeight;
        }

        function generateResponse(userMessage) {
            const lowerMessage = userMessage.toLowerCase();
            
            // Find matching keyword
            for (const [keyword, category] of Object.entries(keywordMap)) {
                if (lowerMessage.includes(keyword)) {
                    const responses = chatbotResponses[category];
                    return responses[Math.floor(Math.random() * responses.length)];
                }
            }

            // Check for specific patterns
            if (lowerMessage.includes('how to') || lowerMessage.includes('how do')) {
                if (lowerMessage.includes('search') || lowerMessage.includes('job')) {
                    return chatbotResponses.jobSearch[Math.floor(Math.random() * chatbotResponses.jobSearch.length)];
                } else if (lowerMessage.includes('account') || lowerMessage.includes('register')) {
                    return chatbotResponses.account[Math.floor(Math.random() * chatbotResponses.account.length)];
                } else if (lowerMessage.includes('resume')) {
                    return chatbotResponses.resume[Math.floor(Math.random() * chatbotResponses.resume.length)];
                }
            }

            // Default response
            const defaultResponses = chatbotResponses.default;
            return defaultResponses[Math.floor(Math.random() * defaultResponses.length)];
        }

        function showTypingIndicator() {
            document.getElementById('typingIndicator').style.display = 'flex';
        }

        function hideTypingIndicator() {
            document.getElementById('typingIndicator').style.display = 'none';
        }

        // Initialize chatbot
        document.addEventListener('DOMContentLoaded', function() {
            const input = document.getElementById('messageInput');
            input.focus();
        });
    </script>
</body>
</html>
